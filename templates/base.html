<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}AI Tools{% endblock %}</title>

  <!-- PWA -->
  {% block manifest_link %}<link rel="manifest" href="/manifest.json">{% endblock %}
  <meta name="theme-color" content="{% block theme_color %}#7c3aed{% endblock %}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="{% block apple_title %}AI Tools{% endblock %}">
  <link rel="apple-touch-icon" href="{% block apple_icon %}/static/icons/home-apple-180.png{% endblock %}">

  <link rel="stylesheet" href="/static/css/mobile.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --accent:      {% block accent %}#7c3aed{% endblock %};
      --accent-dark: {% block accent_dark %}#5b21b6{% endblock %};
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Page content ── -->
<div class="page-wrap">

  <div id="inlineMsg">
    <i id="inlineMsgIcon" class="fas fa-circle-check"></i>
    <span id="inlineMsgText"></span>
    <button class="msg-close" onclick="hideMsg()">✕</button>
  </div>

  {% block content %}{% endblock %}

</div>

<script>
let _msgTimer = null;
const _ICONS = { success:'fa-circle-check', error:'fa-circle-xmark', warn:'fa-triangle-exclamation', info:'fa-circle-info' };
function showMsg(text, type='info', autoDismiss=true) {
  const el = document.getElementById('inlineMsg');
  document.getElementById('inlineMsgIcon').className = 'fas ' + (_ICONS[type] || 'fa-circle-info');
  document.getElementById('inlineMsgText').textContent = text;
  el.className = 'show ' + type;
  clearTimeout(_msgTimer);
  if (autoDismiss && type !== 'error') _msgTimer = setTimeout(hideMsg, 5000);
}
function hideMsg() {
  document.getElementById('inlineMsg').className = '';
  clearTimeout(_msgTimer);
}

</script>
{% block scripts %}{% endblock %}
<!-- ── Report Modal ─────────────────────────────────────────────────────── -->
<div id="reportOverlay" class="report-overlay" aria-modal="true" role="dialog" aria-labelledby="reportModalTitle">
  <div class="report-sheet" id="reportSheet">

    <!-- drag handle -->
    <div class="report-drag-handle"></div>

    <!-- header -->
    <div class="report-header">
      <div class="report-header-icon">
        <i class="fas fa-flag"></i>
      </div>
      <div class="report-header-text">
        <h3 id="reportModalTitle">Report Content</h3>
        <p>Help us keep AI content safe &amp; accurate</p>
      </div>
      <button class="report-close-btn" onclick="closeReportModal()" aria-label="Close">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <!-- scrollable body -->
    <div class="report-body">
      <div class="report-section-label">What's the issue? <span class="report-required">*</span></div>
      <div id="reportReasons" class="report-reasons">
        <label class="report-reason-label" data-icon="🚫">
          <input type="radio" name="reportReason" value="harmful">
          <span class="rrl-icon">🚫</span>
          <span class="rrl-text">
            <span class="rrl-title">Harmful or offensive</span>
            <span class="rrl-sub">Content that could cause harm or offense</span>
          </span>
          <span class="rrl-check"><i class="fas fa-check"></i></span>
        </label>
        <label class="report-reason-label" data-icon="❌">
          <input type="radio" name="reportReason" value="inaccurate">
          <span class="rrl-icon">❌</span>
          <span class="rrl-text">
            <span class="rrl-title">Inaccurate information</span>
            <span class="rrl-sub">Factually wrong or misleading content</span>
          </span>
          <span class="rrl-check"><i class="fas fa-check"></i></span>
        </label>
        <label class="report-reason-label" data-icon="👶">
          <input type="radio" name="reportReason" value="inappropriate">
          <span class="rrl-icon">👶</span>
          <span class="rrl-text">
            <span class="rrl-title">Inappropriate for audience</span>
            <span class="rrl-sub">Not suitable for the intended age group</span>
          </span>
          <span class="rrl-check"><i class="fas fa-check"></i></span>
        </label>
        <label class="report-reason-label" data-icon="©️">
          <input type="radio" name="reportReason" value="copyright">
          <span class="rrl-icon">©️</span>
          <span class="rrl-text">
            <span class="rrl-title">Copyright concern</span>
            <span class="rrl-sub">Possible plagiarism or IP violation</span>
          </span>
          <span class="rrl-check"><i class="fas fa-check"></i></span>
        </label>
        <label class="report-reason-label" data-icon="💬">
          <input type="radio" name="reportReason" value="other">
          <span class="rrl-icon">💬</span>
          <span class="rrl-text">
            <span class="rrl-title">Other</span>
            <span class="rrl-sub">Something else not listed above</span>
          </span>
          <span class="rrl-check"><i class="fas fa-check"></i></span>
        </label>
      </div>

      <div class="report-section-label" style="margin-top:18px;">
        Additional details
        <span style="color:#333;font-weight:500;font-size:12px;margin-left:4px;">(optional)</span>
      </div>
      <textarea class="textarea" id="reportDetails" rows="3"
        placeholder="Describe the issue in more detail…"
        style="resize:none;min-height:76px;font-size:14.5px;"></textarea>
    </div>

    <!-- footer actions -->
    <div class="report-footer">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeReportModal()">Cancel</button>
      <button class="btn btn-danger" style="flex:1.6;" id="reportSubmitBtn" onclick="submitReport()">
        <i class="fas fa-flag"></i> Submit Report
      </button>
    </div>

  </div>
</div>

<style>
/* ── Report overlay ── */
.report-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 1100;
  background: rgba(0,0,0,0);
  align-items: flex-end; justify-content: center;
  transition: background .25s ease;
}
.report-overlay.show {
  display: flex;
  background: rgba(0,0,0,.72);
}

/* ── Bottom sheet ── */
.report-sheet {
  background: #0e0e0e;
  border-top: 1px solid #1e1e1e;
  border-radius: 22px 22px 0 0;
  width: 100%; max-width: 540px;
  max-height: 92dvh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(.32,1,.28,1);
  box-shadow: 0 -24px 80px rgba(0,0,0,.6);
  overflow: hidden;
}
.report-overlay.show .report-sheet {
  transform: translateY(0);
}

/* drag handle */
.report-drag-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: #2a2a2a; margin: 12px auto 0;
  flex-shrink: 0;
}

/* header */
.report-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px 14px;
  border-bottom: 1px solid #181818;
  flex-shrink: 0;
}
.report-header-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: rgba(239,68,68,.14); color: #ef4444;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.report-header-text { flex: 1; min-width: 0; }
.report-header-text h3 { font-size: 17px; font-weight: 800; color: #f0f0f0; margin: 0 0 2px; }
.report-header-text p  { font-size: 13px; color: #3a3a3a; margin: 0; }
.report-close-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: #1a1a1a; border: 1px solid #222;
  color: #555; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s; flex-shrink: 0;
}
.report-close-btn:hover { background: #222; color: #ccc; }

/* scrollable body */
.report-body {
  flex: 1; overflow-y: auto; padding: 18px 20px 4px;
  overscroll-behavior: contain;
}
.report-body::-webkit-scrollbar { width: 4px; }
.report-body::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.report-section-label {
  font-size: 12.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: #3a3a3a; margin-bottom: 10px;
}
.report-required { color: #ef4444; margin-left: 2px; }

/* reason options */
.report-reasons { display: flex; flex-direction: column; gap: 7px; }
.report-reason-label {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 14px; border-radius: 12px;
  border: 1px solid #1c1c1c; background: #111;
  cursor: pointer; transition: border-color .15s, background .15s;
  user-select: none; position: relative;
}
.report-reason-label input[type="radio"] { display: none; }
.rrl-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }
.rrl-text { flex: 1; min-width: 0; }
.rrl-title { display: block; font-size: 14px; font-weight: 700; color: #aaa; line-height: 1.3; }
.rrl-sub   { display: block; font-size: 12px; color: #383838; margin-top: 2px; line-height: 1.3; }
.rrl-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid #252525; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: transparent; background: transparent;
  transition: all .15s;
}
.report-reason-label:hover { border-color: #2c2c2c; background: #141414; }
.report-reason-label:hover .rrl-title { color: #ccc; }
.report-reason-label:has(input:checked) {
  border-color: rgba(239,68,68,.45);
  background: rgba(239,68,68,.07);
}
.report-reason-label:has(input:checked) .rrl-title { color: #fca5a5; }
.report-reason-label:has(input:checked) .rrl-sub   { color: rgba(252,165,165,.45); }
.report-reason-label:has(input:checked) .rrl-check {
  background: #ef4444; border-color: #ef4444; color: #fff;
}

/* footer */
.report-footer {
  display: flex; gap: 10px; padding: 14px 20px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  border-top: 1px solid #181818; flex-shrink: 0;
  background: #0e0e0e;
}

/* centre on wider screens */
@media (min-width: 541px) {
  .report-sheet {
    border-radius: 22px;
    margin: auto;
    max-height: 88dvh;
  }
  .report-overlay.show { align-items: center; }
}
</style>

<script>
let _reportType = '', _reportId = 0;

function openReportModal(contentType, contentId) {
  _reportType = contentType;
  _reportId   = contentId;
  document.querySelectorAll('input[name="reportReason"]').forEach(r => r.checked = false);
  document.getElementById('reportDetails').value = '';
  const overlay = document.getElementById('reportOverlay');
  overlay.style.display = 'flex';
  // Trigger animation on next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => overlay.classList.add('show'));
  });
  document.body.style.overflow = 'hidden';
}

function closeReportModal() {
  const overlay = document.getElementById('reportOverlay');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => { overlay.style.display = 'none'; }, 330);
}

document.getElementById('reportOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeReportModal();
});

// Close on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('reportOverlay').classList.contains('show')) {
    closeReportModal();
  }
});

async function submitReport() {
  const reason  = document.querySelector('input[name="reportReason"]:checked')?.value;
  const details = document.getElementById('reportDetails').value.trim();
  if (!reason) { showMsg('Please select a reason.', 'error', false); return; }

  const btn = document.getElementById('reportSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Submitting…';

  const res = await fetch('/report/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content_type: _reportType, content_id: _reportId, reason, details }),
  });
  const d = await res.json();

  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-flag"></i> Submit Report';

  if (d.success) {
    closeReportModal();
    showMsg('Report submitted. Thank you.', 'success');
  } else {
    showMsg(d.error || 'Failed to submit report.', 'error', false);
  }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
